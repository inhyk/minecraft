<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 2D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
canvas.inventory-open { cursor: default; }
</style>

<body>
<canvas id="game"></canvas>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Game Scripts (load order matters) -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/blocks.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/village.js"></script>
<script src="js/villager.js"></script>
<script src="js/world.js"></script>
<script src="js/player.js"></script>
<script src="js/mining.js"></script>
<script src="js/particles.js"></script>
<script src="js/camera.js"></script>
<script src="js/clouds.js"></script>
<script src="js/mobs.js"></script>
<script src="js/animals.js"></script>
<script src="js/inventory.js"></script>
<script src="js/multiplayer.js"></script>
<script src="js/render.js"></script>
<script src="js/achievements.js"></script>
<script src="js/portals.js"></script>
<script src="js/nethermobs.js"></script>

</html>
